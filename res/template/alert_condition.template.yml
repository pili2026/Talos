# ============================================================
# Talos Alert Condition Configuration Template (Merged Version)
# Version: 1.1.0
# ============================================================

version: "1.1.0"

# ============================================================
# ADAM-4117: Analog Input Module
# ============================================================
ADAM-4117:
  instances:
    "10":
      use_default_alerts: false
      alerts:
        # 單一閥值警報 (Temperature High)
        - code: "TEMP_HIGH"
          name: "Temperature High Warning"
          sources: ["AIn01"]
          type: "threshold"
          condition: "gt"
          threshold: 35.0
          severity: "WARNING"
          message: "Temperature exceeds 35°C"

    "12":
      use_default_alerts: false
      alerts:
        # 平均值警報 (Average Temperature)
        - code: "AVG_TEMP_HIGH"
          name: "Average Temperature High"
          sources: ["AIn02", "AIn03"]
          type: "average"
          condition: "gt"
          threshold: 40.0
          severity: "CRITICAL"
          message: "Average temperature exceeds 40°C"

        # 總和警報 (Sum of Currents)
        - code: "TOTAL_CURRENT_HIGH"
          name: "Total Current High"
          sources: ["AIn04", "AIn05", "AIn06"]
          type: "sum"
          condition: "gt"
          threshold: 100.0
          severity: "WARNING"
          message: "Total current exceeds 100A"

        # 最小值警報 (Min Temperature)
        - code: "MIN_TEMP_LOW"
          name: "Minimum Temperature Low"
          sources: ["AIn02", "AIn03"]
          type: "min"
          condition: "lt"
          threshold: 20.0
          severity: "WARNING"
          message: "Minimum temperature below 20°C"

        # 最大值警報 (Max Temperature)
        - code: "MAX_TEMP_HIGH"
          name: "Maximum Temperature High"
          sources: ["AIn02", "AIn03", "AIn04"]
          type: "max"
          condition: "gt"
          threshold: 45.0
          severity: "CRITICAL"
          message: "Maximum temperature exceeds 45°C"

    "14":
      use_default_alerts: false
      alerts:
        # 混合策略：平均值趨勢 + 個別感測器冗餘
        - code: "FERMENTER_AVG_OVERHEAT"
          name: "Fermenter Average Temperature High"
          sources: ["AIn05", "AIn06"]
          type: "average"
          condition: "gt"
          threshold: 40.0
          severity: "CRITICAL"
          message: "Fermenter average temperature exceeds 40°C"

        - code: "FERMENTER_SENSOR1_OVERHEAT"
          name: "Fermenter Temperature Sensor 1 High"
          sources: ["AIn05"]
          type: "threshold"
          condition: "gt"
          threshold: 42.0
          severity: "WARNING"
          message: "Fermenter sensor 1 exceeds 42°C"

        - code: "FERMENTER_SENSOR2_OVERHEAT"
          name: "Fermenter Temperature Sensor 2 High"
          sources: ["AIn06"]
          type: "threshold"
          condition: "gt"
          threshold: 42.0
          severity: "WARNING"
          message: "Fermenter sensor 2 exceeds 42°C"

# ============================================================
# DO750: Dissolved Oxygen Sensor
# ============================================================
DO750:
  instances:
    "5":
      use_default_alerts: false
      alerts:
        - code: "DO_CRITICAL_LOW"
          name: "Dissolved Oxygen Critical Low"
          sources: ["O2_PCT"]
          type: "threshold"
          condition: "lt"
          threshold: 1.5
          severity: "CRITICAL"
          message: "DO critically low (< 1.5 mg/l). Emergency action required."

        - code: "DO_WARNING_HIGH"
          name: "Dissolved Oxygen High"
          sources: ["O2_PCT"]
          type: "threshold"
          condition: "gt"
          threshold: 3.0
          severity: "WARNING"
          message: "DO level high (> 3.0 mg/l). Check aeration system."

# ============================================================
# TECO_VFD: Variable Frequency Drive
# ============================================================
TECO_VFD:
  instances:
    "1":
      use_default_alerts: false
      alerts:
        # 排程狀態監控：非工作時間不應運行
        - code: "BLOWER_AFTER_HOURS"
          name: "Blower Running After Hours"
          sources: ["RW_ON_OFF"]
          type: "schedule_expected_state"
          expected_state: 0 # 0 = 預期關閉
          use_work_hours: true
          severity: "WARNING"
          message: "Blower is running outside scheduled work hours"

          # 24/7 System: 預期始終開啟
        - code: "COOLING_STOPPED"
          name: "Cooling System Stopped"
          sources: ["RW_ON_OFF"]
          type: "schedule_expected_state"
          expected_state: 1 # 預期始終開啟
          severity: "CRITICAL"
          message: "Critical: Cooling system has stopped"

    "2":
      use_default_alerts: false
      alerts:
        # 過電流監控
        - code: "VFD_OVERCURRENT"
          name: "VFD Current High"
          sources: ["RW_CURRENT"]
          type: "threshold"
          condition: "gt"
          threshold: 10.0
          severity: "WARNING"
          message: "VFD current exceeds 10A"

        # 排程合規監控
        - code: "VFD_AFTER_HOURS"
          name: "VFD Running After Hours"
          sources: ["RW_ON_OFF"]
          type: "schedule_expected_state"
          expected_state: 0
          severity: "WARNING"
          message: "VFD is running outside work hours"

# ============================================================
# SD400: Smart Sensor with Default Alerts
# ============================================================
SD400:
  default_alerts:
    - code: "TEMP_HIGH_DEFAULT"
      name: "Temperature High (Default)"
      sources: ["AIn01"]
      type: "threshold"
      condition: "gt"
      threshold: 50.0
      severity: "WARNING"
  instances:
    "3":
      use_default_alerts: true
      display_name: "Temperature Sensor A"
    "5":
      use_default_alerts: false
      display_name: "Temperature Sensor B"
      alerts:
        - code: "CUSTOM_TEMP_HIGH"
          name: "Custom Temperature High"
          sources: ["AIn01"]
          type: "threshold"
          condition: "gt"
          threshold: 45.0
          severity: "CRITICAL"
    "7":
      use_default_alerts: false
      display_name: "Temperature Sensor C (No Alerts)"

# ============================================================
# ADTEK_CPM10: Power Meter
# ============================================================
ADTEK_CPM10:
  instances:
    "1":
      use_default_alerts: false
      alerts:
        # 時間區段閥值監控 (僅在夜間評估)
        - code: "NIGHT_KW_HIGH"
          name: "用電異常（夜間）"
          sources: ["Kw"]
          type: "schedule_threshold"
          condition: "gt"
          threshold: 10.0
          active_hours:
            start: "20:00"
            end: "07:00"
          severity: "WARNING"
          message: "Power meter KW exceeds 10 during off-hours. Check for unauthorized usage."
