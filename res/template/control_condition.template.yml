version: "2.0.0"

TECO_VFD:
  default_controls: []

  instances:
    "1":
      use_default_controls: false
      controls:
        # ========================================
        # Test 1: THRESHOLD - 單設備單 Pin
        # ========================================
        - name: "Test 1: Threshold Single Pin"
          code: TEST_THRESHOLD_SINGLE_PIN
          priority: 100
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01]
                sources_id: test1_temp
                type: threshold
                operator: gt
                threshold: 2.0
                hysteresis: 0.1
                debounce_sec: 0
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 45.0

        # ========================================
        # Test 2: THRESHOLD - 單設備多 Pin 聚合
        # ========================================
        - name: "Test 2: Threshold Multi-Pin Average"
          code: TEST_THRESHOLD_MULTI_PIN
          priority: 101
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01, AIn02]
                    aggregation: average
                sources_id: test2_temp_avg
                type: threshold
                operator: gte
                threshold: 2.5
                hysteresis: 0.1
                debounce_sec: 3
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 46.0

        # ========================================
        # Test 3: DIFFERENCE - 跨設備差值
        # ========================================
        - name: "Test 3: Difference Between Devices"
          code: TEST_DIFFERENCE_CROSS_DEVICE
          priority: 102
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01]
                  - device: ADAM-4117
                    slave_id: "14"
                    pins: [AIn01]
                sources_id: test3_temp_diff
                type: difference
                operator: gt
                threshold: 1.0
                abs: false # 有方向性：12 - 14
                hysteresis: 0.2
                debounce_sec: 0
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 47.0

        # ========================================
        # Test 4: DIFFERENCE - 同設備內 Pin 差值
        # ========================================
        - name: "Test 4: Difference Within Device"
          code: TEST_DIFFERENCE_WITHIN_DEVICE
          priority: 103
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01] # ← Source 1
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn02] # ← Source 2
                sources_id: test4_pin_diff
                type: difference
                operator: gt
                threshold: 0.5
                abs: true
                hysteresis: 0.1
                debounce_sec: 0
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 48.0

        # ========================================
        # Test 5: AVERAGE - 跨設備平均
        # ========================================
        - name: "Test 5: Average Across Devices"
          code: TEST_AVERAGE_CROSS_DEVICE
          priority: 104
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01, AIn02]
                    aggregation: average
                  - device: ADAM-4117
                    slave_id: "14"
                    pins: [AIn01, AIn02]
                    aggregation: average
                sources_id: test5_dual_avg
                type: average
                operator: gte
                threshold: 2.0
                hysteresis: 0.1
                debounce_sec: 3
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 49.0

        # ========================================
        # Test 6: SUM - 跨設備總和
        # ========================================
        - name: "Test 6: Sum Across Devices"
          code: TEST_SUM_CROSS_DEVICE
          priority: 105
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01]
                  - device: ADAM-4117
                    slave_id: "14"
                    pins: [AIn01]
                sources_id: test6_sum
                type: sum
                operator: gt
                threshold: 4.0
                hysteresis: 0.2
                debounce_sec: 0
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 50.0

        # ========================================
        # Test 7: MIN - 跨設備最小值
        # ========================================
        - name: "Test 7: Min Across Devices"
          code: TEST_MIN_CROSS_DEVICE
          priority: 106
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01]
                  - device: ADAM-4117
                    slave_id: "14"
                    pins: [AIn01]
                sources_id: test7_min
                type: min
                operator: lt
                threshold: 1.5
                hysteresis: 0.1
                debounce_sec: 0
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 51.0

        # ========================================
        # Test 8: MAX - 跨設備最大值
        # ========================================
        - name: "Test 8: Max Across Devices"
          code: TEST_MAX_CROSS_DEVICE
          priority: 107
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01]
                  - device: ADAM-4117
                    slave_id: "14"
                    pins: [AIn01]
                sources_id: test8_max
                type: max
                operator: gt
                threshold: 3.0
                hysteresis: 0.1
                debounce_sec: 0
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 52.0

        # ========================================
        # Test 9: ABSOLUTE_LINEAR - 絕對線性控制
        # ========================================
        - name: "Test 9: Absolute Linear Policy"
          code: TEST_ABSOLUTE_LINEAR
          priority: 108
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01, AIn02]
                    aggregation: average
                sources_id: test9_linear_input
                type: threshold
                operator: gte
                threshold: 0.0 # 總是啟用
          policy:
            type: absolute_linear
            input_source: test9_linear_input
            base_freq: 40.0
            base_value: 2.0
            gain_hz_per_unit: 5.0 # 每升高 1°C，頻率增加 5 Hz
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ

        # ========================================
        # Test 10: INCREMENTAL_LINEAR - 增量控制
        # ========================================
        - name: "Test 10: Incremental Linear Policy"
          code: TEST_INCREMENTAL_LINEAR
          priority: 109
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01]
                sources_id: test10_incr_input
                type: threshold
                operator: gt
                threshold: 2.5
          policy:
            type: incremental_linear
            input_source: test10_incr_input
            gain_hz_per_unit: 2.0 # 每次調整 +2 Hz
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: adjust_frequency
              target: RW_HZ

        # ========================================
        # Test 11: 組合條件 - ALL
        # ========================================
        - name: "Test 11: Composite ALL Condition"
          code: TEST_COMPOSITE_ALL
          priority: 110
          blocking: false
          active_time_ranges: []
          composite:
            all:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01]
                type: threshold
                operator: gt
                threshold: 1.5
              - sources:
                  - device: ADAM-4117
                    slave_id: "14"
                    pins: [AIn01]
                type: threshold
                operator: gt
                threshold: 1.5
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 53.0

        # ========================================
        # Test 12: BETWEEN 運算符
        # ========================================
        - name: "Test 12: Between Operator"
          code: TEST_BETWEEN_OPERATOR
          priority: 111
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01, AIn02]
                    aggregation: average
                sources_id: test12_between
                type: threshold
                operator: between
                min: 1.5
                max: 2.5
                hysteresis: 0.1
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 54.0

        # ========================================
        # Test 13: Priority 保護機制
        # ========================================
        - name: "Test 13: High Priority Override"
          code: TEST_HIGH_PRIORITY
          priority: 5 # 高優先級
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01]
                type: threshold
                operator: gt
                threshold: 3.0
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 60.0 # 高頻

        # ========================================
        # Test 14: Blocking 規則
        # ========================================
        - name: "Test 14: Blocking Rule"
          code: TEST_BLOCKING_RULE
          priority: 1 # 最高優先級
          blocking: true # 阻止後續規則
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01]
                type: threshold
                operator: gt
                threshold: 4.0
          policy:
            type: discrete_setpoint
          actions:
            - model: TECO_VFD
              slave_id: "1"
              type: set_frequency
              target: RW_HZ
              value: 35.0 # 緊急降速

        # ========================================
        # Test 15: PULSE MODE - Pulse Type A (1→0)
        # 情境：溫度過高時觸發 purge valve
        # 行為：寫入 1 → 等待 500ms → 寫入 0
        # 對應硬體：A Contact (NO) 閥門，通電開閥，脈衝後自動關閉
        # ========================================
        - name: "Test 15: Pulse Mode Type A (NO)"
          code: TEST_PULSE_TYPE_A
          priority: 120
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "12"
                    pins: [AIn01]
                type: threshold
                operator: gt
                threshold: 3.5
          policy:
            type: discrete_setpoint
          actions:
            - model: IMA_C
              slave_id: "5"
              type: write_do
              target: DOut01
              switch_mode: pulse # ← 啟用脈衝模式
              pulse:
                start_value: 1 # 第一次寫入：開啟
                end_value: 0 # 第二次寫入：關閉
                duration_ms: 500 # 中間等待 500ms

        # ========================================
        # Test 16: PULSE MODE - Pulse Type B (0→1)
        # 情境：壓力過低時觸發 reset 信號
        # 行為：寫入 0 → 等待 800ms → 寫入 1
        # 對應硬體：B Contact (NC) 設備，斷電觸發，脈衝後恢復常閉狀態
        # ========================================
        - name: "Test 16: Pulse Mode Type B (NC)"
          code: TEST_PULSE_TYPE_B
          priority: 121
          blocking: false
          active_time_ranges: []
          composite:
            any:
              - sources:
                  - device: ADAM-4117
                    slave_id: "14"
                    pins: [AIn01]
                type: threshold
                operator: lt
                threshold: 1.0
          policy:
            type: discrete_setpoint
          actions:
            - model: IMA_C
              slave_id: "5"
              type: write_do
              target: DOut02
              switch_mode: pulse # ← 啟用脈衝模式
              pulse:
                start_value: 0 # 第一次寫入：斷電
                end_value: 1 # 第二次寫入：恢復
                duration_ms: 800 # 中間等待 800ms
